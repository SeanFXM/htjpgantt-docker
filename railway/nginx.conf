# Railway 网关：前端 + 后端代理
# 后端服务使用 Railway 内部 DNS: servicename.railway.internal
server {
    listen 80 default_server;
    client_max_body_size 100M;
    charset utf-8;

    # 前端静态文件
    location / {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html =404;
    }

    # API
    location /api/ {
        proxy_pass http://taiga-back.railway.internal:8000/api/;
        proxy_pass_header Server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Admin
    location /admin/ {
        proxy_pass http://taiga-back.railway.internal:8000/admin/;
        proxy_pass_header Server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Static (taiga-back 静态文件，需 collectstatic)
    location /static/ {
        proxy_pass http://taiga-back.railway.internal:8000/static/;
        proxy_set_header Host $http_host;
    }

    # Media (通过 taiga-protected)
    location /media/ {
        proxy_pass http://taiga-protected.railway.internal:8003/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    # Events (WebSocket)
    location /events {
        proxy_pass http://taiga-events.railway.internal:8888/events;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}
