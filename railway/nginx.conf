# Railway 网关：前端 + 后端代理
# 后端服务使用 Railway 内部 DNS: servicename.railway.internal
# 使用 resolver + 变量强制每次请求解析 DNS，避免 Railway 服务重启后 IP 变更导致超时
# 参考: https://help.railway.com/questions/nginx-stale-dns-entries-for-redeployed-services
server {
    listen 80 default_server;
    listen 8080 default_server;
    client_max_body_size 100M;
    charset utf-8;

    # Railway 内部 DNS，valid=10s 确保定期刷新
    resolver [fd12::10] valid=10s;
    resolver_timeout 5s;

    set $taiga_back "taiga-back.railway.internal";
    set $taiga_protected "taiga-protected.railway.internal";
    set $taiga_events "taiga-events.railway.internal";

    # 前端静态文件
    location / {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html =404;
    }

    # API
    location /api/ {
        proxy_pass http://$taiga_back:8000/api/;
        proxy_pass_header Server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Admin
    location /admin/ {
        proxy_pass http://$taiga_back:8000/admin/;
        proxy_pass_header Server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static (taiga-back 静态文件，需 collectstatic)
    location /static/ {
        proxy_pass http://$taiga_back:8000/static/;
        proxy_set_header Host $http_host;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Media (通过 taiga-protected)
    location /media/ {
        proxy_pass http://$taiga_protected:8003/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    # Events (WebSocket)
    location /events {
        proxy_pass http://$taiga_events:8888/events;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}
